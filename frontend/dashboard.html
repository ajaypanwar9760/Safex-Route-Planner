<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<title>Safe Route Planner</title>
</head>
<body>

<div id="loader-overlay" class="hidden">
  <div class="car-container">
    <svg class="car-loader" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="url(#carGradient)">
      <defs>
        <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#00e676;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#1de9b6;stop-opacity:1" />
        </linearGradient>
      </defs>
      <path d="M135.2 117.4L109.1 192H402.9l-26.1-74.6C372.3 104.6 360.2 96 346.6 96H165.4c-13.6 0-25.7 8.6-30.2 21.4zM39.6 196.8L74.8 96.3C88.3 57.8 124.6 32 165.4 32H346.6c40.8 0 77.1 25.8 90.6 64.3l35.2 100.5c23.2 9.6 39.6 32.5 39.6 59.2V400v48c0 17.7-14.3 32-32 32H448c-17.7 0-32-14.3-32-32V400H96v48c0 17.7-14.3 32-32 32H32c-17.7 0-32-14.3-32-32V400 256c0-26.7 16.4-49.6 39.6-59.2zM128 288a32 32 0 1 0 -64 0 32 32 0 1 0 64 0zm288 32a32 32 0 1 0 0-64 32 32 0 1 0 0 64z"/>
    </svg>
    <div class="loader-text">Finding Safe Route...</div>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-header">
    <h3>Safe Route Planner</h3>
  </div>
  
  <div class="input-group">
    <label for="start">Start Location</label>
    <div style="position:relative;">
      <input id="start" placeholder="Enter start location..." autocomplete="off">
      <div id="start-list" class="autocomplete-list hidden"></div>
    </div>
  </div>
  
  <div class="input-group">
    <label for="end">Destination</label>
    <div style="position:relative;">
      <input id="end" placeholder="Enter destination..." autocomplete="off">
      <div id="end-list" class="autocomplete-list hidden"></div>
    </div>
  </div>
  
  <button onclick="searchRoute()" class="find-btn">
    <span>Find Safe Route</span>
  </button>
  
  <div id="info" class="info-card hidden">
    <div class="info-item">
      <span class="info-label">Distance</span>
      <span id="dist" class="info-value">-</span>
    </div>
    <div class="info-item">
      <span class="info-label">Estimated Time</span>
      <span id="time" class="info-value">-</span>
    </div>
    <div class="info-item">
      <span class="info-label">Safety Score</span>
      <span id="safe" class="info-value highlight-score">-</span>
    </div>
  </div>
</div>
<div id="map"></div>
<script src="config.js"></script>
<script src="map.js"></script>
<script src="app.js"></script>
</body>
</html>
